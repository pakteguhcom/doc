<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Viewer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>
<body>
    <div class="app-container">
        <div id="toolbar">
            <div class="toolbar-group">
                <label for="file-upload" class="toolbar-button" title="Buka File">
                    <i class="fa-solid fa-folder-open"></i>
                </label>
                <input type="file" id="file-upload" accept=".docx, .txt" hidden>
            </div>

            <div class="toolbar-group">
                <button id="bold-btn" class="toolbar-button" title="Bold"><i class="fa-solid fa-bold"></i></button>
                <button id="italic-btn" class="toolbar-button" title="Italic"><i class="fa-solid fa-italic"></i></button>
                <button id="underline-btn" class="toolbar-button" title="Underline"><i class="fa-solid fa-underline"></i></button>
            </div>

            <div class="toolbar-group">
                <button id="ul-btn" class="toolbar-button" title="Bulleted List"><i class="fa-solid fa-list-ul"></i></button>
                <button id="ol-btn" class="toolbar-button" title="Numbered List"><i class="fa-solid fa-list-ol"></i></button>
            </div>

            <div class="toolbar-group">
                <button id="align-left-btn" class="toolbar-button" title="Align Left"><i class="fa-solid fa-align-left"></i></button>
                <button id="align-center-btn" class="toolbar-button" title="Align Center"><i class="fa-solid fa-align-center"></i></button>
                <button id="align-right-btn" class="toolbar-button" title="Align Right"><i class="fa-solid fa-align-right"></i></button>
            </div>

            <div class="toolbar-group">
                <button id="orientation-btn" class="toolbar-button" title="Ubah Orientasi"><i class="fa-solid fa-file-invoice"></i></button>
            </div>
            
            <div class="toolbar-group">
                 <button id="zoom-out-btn" class="toolbar-button" title="Zoom Out"><i class="fa-solid fa-magnifying-glass-minus"></i></button>
                 <button id="zoom-in-btn" class="toolbar-button" title="Zoom In"><i class="fa-solid fa-magnifying-glass-plus"></i></button>
            </div>

            <div class="toolbar-group">
                <button id="export-pdf-btn" class="toolbar-button" title="Ekspor ke PDF"><i class="fa-solid fa-file-pdf"></i></button>
                <button id="export-img-btn" class="toolbar-button" title="Ekspor ke Gambar"><i class="fa-solid fa-file-image"></i></button>
                <button id="print-btn" class="toolbar-button" title="Cetak"><i class="fa-solid fa-print"></i></button>
            </div>
        </div>

        <div id="viewer-container">
            <div id="viewer" contenteditable="true" class="portrait">
                <p>Silakan buka file .docx atau .txt untuk memulai...</p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.7.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script src="script.js"></script>
</body>
</html>
